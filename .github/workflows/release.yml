name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_id: win-x64
            os: windows-latest
            eb_args: "--win --x64"
          - job_id: win-arm64
            os: windows-latest
            eb_args: "--win --arm64"
          - job_id: mac-x64
            os: macos-latest
            eb_args: "--mac --x64"
          - job_id: mac-arm64
            os: macos-latest
            eb_args: "--mac --arm64"
          - job_id: linux-x64
            os: ubuntu-latest
            eb_args: "--linux --x64"
          - job_id: linux-arm64
            os: ubuntu-24.04-arm
            eb_args: "--linux --arm64"

    name: build-${{ matrix.job_id }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Linux AppImage dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # --ignore-scripts skips electron's postinstall download; restore it explicitly
      - name: Download Electron binary
        run: node node_modules/electron/install.js

      - name: Generate icons
        run: npm run generate:icons

      - name: Install Playwright Chromium
        run: npm run install:browsers

      - name: Build app
        run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.eb_args }} --publish never

      - name: Remove universal Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem release -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '-win\.exe$' -and $_.Name -notmatch '-win-(x64|arm64)\.exe$' } |
            Remove-Item -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoforge-${{ matrix.job_id }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.yml
            release/*.yaml
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-upload
          merge-multiple: true

      - name: List release files
        run: find dist-upload -type f | sort

      - name: Remove universal Windows installer
        run: |
          find dist-upload -type f -name '*-win.exe' \
            ! -name '*-win-x64.exe' ! -name '*-win-arm64.exe' -delete

      - name: Package installers for release
        run: |
          # Windows: zip (avoid browser blocking direct .exe downloads)
          find dist-upload -type f -name '*.exe' | while read -r f; do
            zip -j "${f}.zip" "$f"
            rm "$f"
          done

          # Linux: tar.gz
          find dist-upload -type f -name '*.AppImage' | while read -r f; do
            tar -czf "${f%.AppImage}.tar.gz" -C "$(dirname "$f")" "$(basename "$f")"
            rm "$f"
          done

          # macOS: keep .dmg as-is
          find dist-upload -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist-upload/**/*.zip
            dist-upload/**/*.dmg
            dist-upload/**/*.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
