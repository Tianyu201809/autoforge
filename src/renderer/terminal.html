<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoforge 终端</title>
    <script>
      ;(function () {
        var MODES = { forge: 'dark', obsidian: 'dark', forest: 'dark', sand: 'light', ivory: 'light', blossom: 'light' }
        var skin =
          localStorage.getItem('autoforge-skin') ||
          (function () {
            var t =
              localStorage.getItem('autoforge-theme') || localStorage.getItem('scriptbox-theme')
            if (t === 'light') return 'sand'
            if (t === 'dark') return 'forge'
            return 'forge'
          })()
        if (!MODES[skin]) skin = 'forge'
        document.documentElement.setAttribute('data-theme', MODES[skin])
        document.documentElement.setAttribute('data-skin', skin)
      })()
    </script>
  </head>
  <body class="font-sans antialiased overflow-hidden select-none">
    <div id="app"></div>
    <script type="module" src="./src/terminal-main.ts"></script>
  </body>
</html>
